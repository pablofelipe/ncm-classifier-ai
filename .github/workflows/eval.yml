name: eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      # The pipeline never calls Gemini yet (rerank is Passthrough), but
      # src.config.Settings() validates gemini_api_key at import time
      # (module-level instantiation). A non-secret placeholder satisfies that
      # validation; no real key is needed until the Gemini rerank adapter lands.
      GEMINI_API_KEY: dummy-not-used-in-skeleton
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Cache Hugging Face models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          # embedding.py holds EMBEDDING_MODEL_NAME and the pinned
          # EMBEDDING_MODEL_REVISION, so any change to the model or its pin
          # busts the cache automatically.
          key: hf-${{ runner.os }}-${{ hashFiles('src/retrieval/embedding.py') }}
      - name: Install torch (CPU-only)
        # Two-step install: torch must come from the dedicated CPU index first,
        # otherwise ".[ml]" pulls the ~2 GB CUDA wheel. See README.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install -e ".[dev,ml]"
      - name: Run unit tests
        run: make test
      - name: Build Chroma index
        # The index is not versioned; the eval and integration tiers below
        # require it. First uncached run also downloads the e5-small model here.
        run: make index
      - name: Run integration tests
        # The colloquial-name case is a documented xfail (ADR-0004 known
        # limitation) and must report as XFAIL, not as a failure.
        run: python -m pytest tests/integration -v
      - name: Run eval gate
        run: make eval
